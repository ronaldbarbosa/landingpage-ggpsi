<section id="home" class="mx-4 sm:mx-8 md:mx-12 lg:mx-16 xl:mx-20 my-4 sm:my-6 md:my-8">
  <div class="info-wrap p-4 sm:p-6 md:p-8 bg-white shadow-lg rounded-lg">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 lg:gap-4 xl:mx-10 2xl:mx-20">
      <div class="md:col-span-1 flex justify-center">
        <img ngSrc="/assets/logo-vetor.png" width="400" height="600" priority class="fade-up rounded-4xl"
          alt="Logo Árvore e Cérebro" />
      </div>
      <div class="md:col-span-2 fade-up px-2 sm:px-0 mt-8">
        <div class="section-title flex flex-col items-center mb-6 sm:mb-8 md:mb-10">
          <h2 class="text-xl sm:text-2xl md:text-3xl font-bold mb-3 sm:mb-4 pb-2 sm:pb-4 fade-up">Gabriela Goia:
            Psicóloga & Gestalt Terapeuta</h2>
        </div>

        <p class="italic mt-4 sm:mt-6 md:mt-8 text-sm sm:text-base text-center md:text-left">
          Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore
          magna aliqua.
        </p>

        <div class="flex justify-center">
          <a [routerLink]="['/sobre']" class="
            bg-[var(--primary)]
            uppercase
            font-semibold
            text-[12px]
            tracking-[1px]
            inline-block
            px-[40px]
            py-[12px]
            rounded-full
            mt-[30px]
            btn-sobre
          ">
            Sobre mim
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
