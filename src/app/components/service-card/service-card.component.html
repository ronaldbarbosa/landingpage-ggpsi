<div class="bg-white p-6 rounded-lg shadow flex flex-col h-full fade-up-slowly text-center">
  <div class="mb-4">
    <i [class]="service.icon + ' bi text-2xl sm:text-4xl w-10 h-10 sm:w-11 sm:h-11 rounded-full mr-3 sm:mr-3.5 bg-gray-100'"></i>
  </div>

  <h3 class="text-lg font-semibold text-gray-900 mb-2">
    {{ service.title }}
  </h3>
  <p class="text-gray-600 text-sm">
    {{ service.subtitle }}
  </p>
</div>
