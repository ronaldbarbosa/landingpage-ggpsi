<nav class="navmenu">
  <!-- Menu Desktop (visível em lg+) -->
  <ul class="hidden lg:flex list-none items-center space-x-2 xl:space-x-4">
    <li class="relative whitespace-nowrap p-2 xl:p-3">
      <a class="link" [routerLink]="['/']" routerLinkActive="link-active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
    </li>
    <li class="relative whitespace-nowrap p-2 xl:p-3">
      <a class="link" [routerLink]="['/sobre']" routerLinkActive="link-active" [routerLinkActiveOptions]="{ exact: true }">Sobre</a>
    </li>
    <li class="relative whitespace-nowrap p-2 xl:p-3">
      <a class="link" [routerLink]="['/servicos']" routerLinkActive="link-active" [routerLinkActiveOptions]="{ exact: true }">Serviços</a>
    </li>
    <li class="relative whitespace-nowrap p-2 xl:p-3">
      <a class="link" [routerLink]="['/contato']" routerLinkActive="link-active" [routerLinkActiveOptions]="{ exact: true }">Contato</a>
    </li>
  </ul>

  <!-- Botão Hamburguer (visível em mobile) -->
  <i 
    class="mobile-nav-toggle lg:hidden bi text-2xl cursor-pointer transition-transform duration-300"
    [class.bi-list]="!isMenuOpen"
    [class.bi-x]="isMenuOpen"
    (click)="toggleMenu()">
  </i>

  <!-- Menu Mobile (overlay) -->
  <div 
    class="lg:hidden fixed inset-0 bg-blck/30 backdrop-invert backdrop-opacity-30 z-40 transition-opacity duration-300"
    [class.hidden]="!isMenuOpen"
    [class.opacity-0]="!isMenuOpen"
    [class.opacity-100]="isMenuOpen"
    (click)="closeMenu()">
  </div>

  <!-- Menu Mobile (sidebar) -->
  <div 
    class="lg:hidden fixed top-0 right-0 h-full w-64 bg-white shadow-lg z-50 transform transition-transform duration-300 ease-in-out"
    [class.translate-x-full]="!isMenuOpen"
    [class.translate-x-0]="isMenuOpen">
    
    <!-- Cabeçalho do Menu Mobile -->
    <div class="p-6">
      <h2 class="text-lg font-semibold text-gray-800">Menu</h2>
    </div>
    
    <!-- Links de Navegação -->
    <ul class="list-none p-4 space-y-4">
      <li>
        <a 
          class="link-mobile block p-3 text-gray-700 hover:bg-gray-100 rounded-lg transition-colors"
          [routerLink]="['/']" 
          routerLinkActive="link-active-mobile"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMenu()">
          Home
        </a>
      </li>
      <li>
        <a 
          class="link-mobile block p-3 text-gray-700 hover:bg-gray-100 rounded-lg transition-colors"
          [routerLink]="['/sobre']" 
          routerLinkActive="link-active-mobile"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMenu()">
          Sobre
        </a>
      </li>
      <li>
        <a 
          class="link-mobile block p-3 text-gray-700 hover:bg-gray-100 rounded-lg transition-colors"
          [routerLink]="['/servicos']" 
          routerLinkActive="link-active-mobile"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMenu()">
          Serviços
        </a>
      </li>
      <li>
        <a 
          class="link-mobile block p-3 text-gray-700 hover:bg-gray-100 rounded-lg transition-colors"
          [routerLink]="['/contato']" 
          routerLinkActive="link-active-mobile"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMenu()">
          Contato
        </a>
      </li>
    </ul>

    <!-- Redes Sociais no Menu Mobile -->
    <div class="absolute bottom-0 left-0 right-0 p-6 bg-gray-50">
      <div class="flex justify-center space-x-4">
        <a href="#" class="flex items-center justify-center w-10 h-10 rounded-full bg-gray-200 hover:bg-primary hover:text-white transition-colors">
          <i class="bi bi-facebook"></i>
        </a>
        <a href="#" class="flex items-center justify-center w-10 h-10 rounded-full bg-gray-200 hover:bg-primary hover:text-white transition-colors">
          <i class="bi bi-instagram"></i>
        </a>
        <a href="#" class="flex items-center justify-center w-10 h-10 rounded-full bg-gray-200 hover:bg-primary hover:text-white transition-colors">
          <i class="bi bi-linkedin"></i>
        </a>
      </div>
      <p class="text-center text-xs text-gray-500 mt-2">Acompanhe meu trabalho nas redes sociais!</p>
    </div>
  </div>
</nav>
